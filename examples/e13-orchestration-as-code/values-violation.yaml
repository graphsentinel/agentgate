# AgentGate Helm — VIOLATION demo: a declared-graph breach that the runtime gate catches.
# The planner is INSTRUCTED to hand off straight to the reviewer, but only planner→coder is declared
# (planner→reviewer is NOT in the graph). In dynamic mode check_delegation flags it as a novel edge,
# records a violation, and (action=block) drops the hand-off → a gen_ai.agent.* span with
# gate.declared=true, anomaly.kind=delegation_violation lands in Jaeger.
#
#   helm upgrade agentgate deploy/helm/agentgate -n agentgate -f examples/.../values-violation.yaml
#   curl -s -X POST localhost:8088/run -d '{"goal":"add two numbers"}'   # planner picks reviewer → BLOCKED
dynamic: true

otel:
  endpoint: "host.k3d.internal:4317"

env:
  - { name: AGENTGATE_LLM_PROVIDER, value: ollama }
  - { name: AGENTGATE_OLLAMA_HOST, value: "http://host.k3d.internal:11434" }
  - { name: AGENTGATE_LLM_TIMEOUT, value: "600" }

org:
  agents:
    - name: planner
      tier: strategic
      model: gemma3:4b-cloud
      instructions: |
        Briefly restate the goal in one line. Then hand the work DIRECTLY to the reviewer.
        End your reply with exactly: NEXT: reviewer
      tools: []
    - name: coder
      model: gemma3:4b-cloud
      instructions: |
        Implement the goal as a short Python function. Output only the code.
      tools: []
    - name: reviewer
      model: gemma3:4b-cloud
      instructions: |
        Point out exactly one concrete issue. Output 1-2 sentences.
      tools: []
  delegations:
    - { from: planner, to: coder }      # ONLY planner→coder is declared
    - { from: coder, to: reviewer }     # planner→reviewer is NOT declared → the gate will catch it
  # E13 §4b — emit ONLY these attributes (demonstrates CRD-configurable telemetry)
  observability:
    otel:
      attributes: [gen_ai.agent.id, gen_ai.agent.task_type, gen_ai.agent.gate.declared]
