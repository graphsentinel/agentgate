apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentdriftpolicies.driftwatch.graphsentinel.org
spec:
  group: driftwatch.graphsentinel.org
  scope: Namespaced
  names:
    kind: AgentDriftPolicy
    plural: agentdriftpolicies
    singular: agentdriftpolicy
    shortNames: [adp]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [selector, baseline, detection, action]
              properties:
                selector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties: { type: string }
                runtimes:
                  type: array
                  items:
                    type: object
                    required: [name, adapter]
                    properties:
                      name: { type: string }
                      adapter: { type: string }     # builtin/kagent | builtin/goose | custom
                      interceptor:
                        type: object
                        properties:
                          port: { type: integer }
                          protocol: { type: string, enum: [mcp, openai-tools, http] }
                baseline:
                  type: object
                  required: [sources]
                  properties:
                    sources:
                      type: array
                      items:
                        x-kubernetes-preserve-unknown-fields: true   # string OR {models: [...]}
                    aggregate: { type: string, enum: [mean], default: mean }
                    window: { type: integer, default: 50, minimum: 1 }
                detection:
                  type: object
                  required: [features, algorithm, threshold]
                  properties:
                    features:
                      type: array
                      items: { type: string, enum: [tool, scope, sequence, argSchemaHash] }
                    algorithm: { type: string, enum: [streaming-zscore], default: streaming-zscore }
                    threshold: { type: number, default: 3.0 }   # RAW z-score
                action: { type: string, enum: [log, drop, block] }
                failurePolicy: { type: string, enum: [failClosed, failOpen], default: failClosed }
                # E11: optionally enforce against a declared contract (an AgenticArchitecture in
                # the same namespace). Omitted -> pure statistical drift (DriftWatch standalone).
                contractRef: { type: string }
                contractHash: { type: string }   # optional: pin a specific reconciled version
                observability:
                  type: object
                  properties:
                    otel:
                      type: object
                      properties:
                        emitEvaluationOn:
                          type: array
                          items: { type: string, enum: [baseline_deviation, danger_detected, inverse_scaling_trend] }
                        endpoint: { type: string }
                        protocol: { type: string, enum: [grpc, "http/protobuf"], default: grpc }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                observedTaskTypes: { type: integer }
                baselineReady: { type: boolean }
      additionalPrinterColumns:
        - name: Action
          type: string
          jsonPath: .spec.action
        - name: Ready
          type: boolean
          jsonPath: .status.baselineReady
        - name: TaskTypes
          type: integer
          jsonPath: .status.observedTaskTypes
