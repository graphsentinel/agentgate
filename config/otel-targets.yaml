# WHERE telemetry goes — an endpoint only. The backend (in-cluster / podman-compose /
# cloud) is decoupled config, never a code or deploy decision (CFP Decoupling note).
#
# DriftWatch (operator + interceptor) only pushes OTLP to this endpoint. Swapping where
# the dashboards live never changes what the cluster enforces.
#
# For the k3d demo with the observability stack in podman-compose on the host:
otlp:
  endpoint: "${DRIFTWATCH_OTLP_ENDPOINT:-host.k3d.internal:4317}"
  protocol: grpc          # grpc | http/protobuf
  insecure: true

# In-cluster alternative (collector as a Service):
#   endpoint: otel-collector.observability.svc.cluster.local:4317
# Cloud alternative:
#   endpoint: otlp.example-vendor.com:4317   (+ auth headers)
